<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 員工打卡異常偵測</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #666; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        .normal { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .anomaly { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔍 異常打卡偵測</h2>
        <div id="status" style="font-size: 12px; text-align: center; color: #999;">模型載入中...</div>
        
        <label>本次工時 (小時):</label>
        <input type="number" id="duration" value="9" step="0.5">
        
        <label>上班時段 (0-23時):</label>
        <input type="number" id="startHour" value="9">
        
        <label>星期幾 (0週日 - 6週六):</label>
        <input type="number" id="weekday" value="1" min="0" max="6">
        
        <button onclick="detect()">立即分析</button>
        <div id="result"></div>
    </div>

    <script>
        let model;
        // 自動抓取目前的網址路徑來載入模型
        async function init() {
            try {
                // 注意：這裡的路徑必須對應你上傳的資料夾名稱
                model = await tf.loadLayersModel('./tfjs_model/model.json');
                document.getElementById('status').innerText = "✅ AI 引擎已就緒";
            } catch (err) {
                document.getElementById('status').innerText = "❌ 模型載入失敗，請確認 tfjs_model 資料夾已上傳";
                console.error(err);
            }
        }

        async function detect() {
            if (!model) return;
            const resDiv = document.getElementById('result');
            
            const d = parseFloat(document.getElementById('duration').value);
            const h = parseFloat(document.getElementById('startHour').value);
            const w = parseFloat(document.getElementById('weekday').value);

            // 特徵歸一化 (需與訓練時一致)
            const input = tf.tensor2d([[d / 24, h / 24, w / 6]]);
            const output = model.predict(input);
            const mse = tf.sub(input, output).square().mean().dataSync()[0];
            const score = (mse * 1000).toFixed(2);

            resDiv.style.display = "block";
            if (score < 10) { // 這裡的 10 是門檻值，可依需求調整
                resDiv.className = "normal";
                resDiv.innerText = "✅ 正常打卡行為 (評分: " + score + ")";
            } else {
                resDiv.className = "anomaly";
                resDiv.innerText = "🚨 偵測到疑似異常！ (評分: " + score + ")";
            }
        }
        init();
    </script>
</body>
</html>
